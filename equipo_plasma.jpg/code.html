<!DOCTYPE html><html><head><meta charset="utf-8"><title>Slide 999</title><style>body,html{margin:0;padding:0;background-color:#131313;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}img{width:100%;height:100%;object-fit:contain;}</style>
    


    <style id="weld-bear-mobile-nav-fix-ultimate">
        /* ULTRA ROBUST MOBILE NAV FIX - No position fixed iOS bugs */
        @media (max-width: 1024px), (pointer: coarse) {
            body, html {
                height: 100dvh !important;
                width: 100vw !important;
                overflow: hidden !important; 
                display: flex !important;
                flex-direction: column !important;
                position: fixed !important; /* Locks viewport on iOS */
                top: 0; left: 0; right: 0; bottom: 0;
            }
            
            #frame-container {
                flex: 1 1 auto !important;
                height: auto !important;
                min-height: 0 !important;
                width: 100% !important;
                overflow-y: auto !important;
                overflow-x: hidden !important;
                -webkit-overflow-scrolling: touch !important;
                display: flex !important;
                flex-direction: column !important;
                transform: none !important;
            }
            
            /* If no frame container exists, main must scroll */
            body > main, #frame-container > main {
                flex-grow: 1 !important;
                height: auto !important;
                overflow-y: auto !important;
                overflow-x: hidden !important;
                -webkit-overflow-scrolling: touch !important;
                padding-bottom: 30px !important;
                display: flex !important;
                flex-direction: column !important;
            }
            
            nav.fixed, nav { 
                flex: 0 0 64px !important;
                position: relative !important; /* Flex bottom element, not fixed! */
                bottom: auto !important;
                left: auto !important;
                width: 100% !important; 
                height: 64px !important; 
                padding: 6px !important; 
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important; 
                justify-content: space-evenly !important; 
                align-items: center !important;
                gap: 4px !important; 
                z-index: 2147483647 !important;
                background: #131313 !important;
                border-top: 1px solid rgba(34,197,94,0.3) !important;
                visibility: visible !important;
                opacity: 1 !important;
                pointer-events: auto !important;
            }
            
            nav button, nav div { 
                flex: 1 1 0 !important; 
                height: 100% !important;
                padding: 4px !important; 
                border: none !important;
                margin: 0 !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
                pointer-events: auto !important;
                touch-action: manipulation !important;
                visibility: visible !important;
            }
            
            nav button:active { background: rgba(34,197,94,0.2) !important; }
            
            /* Remove any invisible overlays */
            .fixed.top-24, .fixed.bottom-24, .fixed.left-6 { display: none !important; }
        }
    </style>

</head><body><img src="screen.png"/>
<script id="weld-bear-sync">
    setTimeout(() => {
        document.querySelectorAll('button').forEach(btn => {
            const text = btn.innerText.toUpperCase();
            if (text.includes('PREV') || text.includes('ANTERIOR') || text.includes('ARROW_BACK') || text.includes('BACK_IOS')) {
                btn.onclick = () => window.parent.postMessage('PREV', '*');
            } else if (text.includes('NEXT') || text.includes('SIGUIENTE') || text.includes('ARROW_FORWARD') || text.includes('FORWARD_IOS')) {
                btn.onclick = () => window.parent.postMessage('NEXT', '*');
            } else if (text.includes('HOME') || text.includes('INICIO')) {
                btn.onclick = () => window.parent.postMessage('HOME', '*');
            }
        });
    }, 500);

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'PageDown') {
            window.parent.postMessage('NEXT', '*');
        } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
            window.parent.postMessage('PREV', '*');
        } else if (e.key === 'Home') {
            window.parent.postMessage('HOME', '*');
        }
    });

    window.addEventListener('load', () => {
        window.parent.postMessage('LOADED', '*');
    });
</script>
\n</body></html>
